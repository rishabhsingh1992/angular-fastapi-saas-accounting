<section class="page">
    <h1>Invoices</h1>
    <table>
        <thead>
            <tr>
                <th>Invoice</th>
                <th>Client</th>
                <th>Due Date</th>
                <th>Status</th>
                <th></th>
            </tr>
        </thead>
        <tbody>
            @for (invoice of invoices(); track invoice.id) {
            <tr>
                <td>{{ invoice.invoiceNumber }}</td>
                <td>{{ invoice.clientName }}</td>
                <td>{{ invoice.dueDate }}</td>
                <td>{{ invoice.status }}</td>
                <td>
                    <a [routerLink]="['/invoices', invoice.id]">View</a>
                </td>
            </tr>
            }
        </tbody>
    </table>
</section>
